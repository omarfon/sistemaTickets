<!-- RF-37 — Login de operador -->
<div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 p-4">

  <div class="w-full max-w-md">

    <!-- Logo + título -->
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-600 text-3xl shadow-lg">
        🏥
      </div>
      <h1 class="text-2xl font-bold text-white">MediTurno Clínica</h1>
      <p class="mt-1 text-sm text-slate-400">Sistema de gestión de colas</p>
    </div>

    <!-- Card de login -->
    <div class="rounded-2xl bg-white p-8 shadow-2xl">

      <h2 class="mb-6 text-lg font-semibold text-gray-900">Iniciar sesión</h2>

      <!-- Error -->
      @if (error()) {
        <div class="mb-4 flex items-center gap-2 rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700 ring-1 ring-red-200" role="alert">
          <span>⚠️</span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Formulario -->
      <form (ngSubmit)="login()" class="flex flex-col gap-4">

        <div>
          <label class="mb-1 block text-xs font-medium text-gray-600" for="email">
            Correo electrónico
          </label>
          <input
            id="email" name="email" type="email" required autocomplete="email"
            [(ngModel)]="email"
            placeholder="operador@mediturno.pe"
            class="w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm transition focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        </div>

        <div>
          <label class="mb-1 block text-xs font-medium text-gray-600" for="password">
            Contraseña
          </label>
          <input
            id="password" name="password" type="password" required autocomplete="current-password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm transition focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="mt-2 w-full rounded-xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 disabled:opacity-60">
          {{ loading() ? 'Ingresando…' : 'Ingresar' }}
        </button>

      </form>

      <!-- Acceso rápido (modo prototipo) -->
      <div class="mt-6 border-t border-gray-100 pt-6">
        <p class="mb-3 text-center text-xs font-medium text-gray-400">Acceso rápido (demo)</p>
        <div class="grid grid-cols-3 gap-2">
          @for (qa of quickAccess; track qa.email) {
            <button
              type="button"
              (click)="quickLogin(qa)"
              class="flex flex-col items-center gap-1 rounded-xl border border-gray-200 bg-gray-50 px-2 py-3 text-center transition hover:border-blue-300 hover:bg-blue-50">
              <span class="text-xl">{{ roleIcon[qa.role] }}</span>
              <span class="text-[10px] font-semibold text-gray-700">{{ qa.label }}</span>
            </button>
          }
        </div>
      </div>

    </div>

    <p class="mt-6 text-center text-xs text-slate-500">
      Módulo 3 — Operadores (RF-37)
    </p>

  </div>
</div>
